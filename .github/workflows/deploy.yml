name: Deploy Stuti Portfolio to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build React + Vite portfolio
        run: npm run build

      - name: Verify production output
        run: |
          test -f dist/index.html
          test -d dist/assets
          ! grep -q '/src/main.jsx' dist/index.html
          grep -q '/assets/' dist/index.html
          echo "Production build verified successfully."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload only the Vite dist folder
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
